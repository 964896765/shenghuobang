services:
  mysql:
    image: mysql:8.0
    container_name: shenghuobang-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shenghuobang
      MYSQL_USER: shenghuobang
      MYSQL_PASSWORD: shenghuobang_dev
      MYSQL_ROOT_PASSWORD: root_dev_only
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - shenghuobang_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_dev_only"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  shenghuobang_mysql_data:
